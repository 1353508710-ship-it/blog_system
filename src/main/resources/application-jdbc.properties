#\u6570\u636E\u6E90Druid\u7684\u914D\u7F6E
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
#\u914D\u7F6EDruid\u8FDE\u63A5\u6C60\u7684\u521D\u59CB\u8FDE\u63A5\u6570
spring.datasource.druid.initial-size=20
#\u914D\u7F6E\u8FDE\u63A5\u6C60\u7684\u6700\u5C0F\u7A7A\u95F2\u8FDE\u63A5\u6570
spring.datasource.druid.min-idle=10
#\u914D\u7F6E\u8FDE\u63A5\u6C60\u7684\u6700\u5927\u6D3B\u8DC3\u8FDE\u63A5\u6570
spring.datasource.druid.max-active=100

#mysql\u6570\u636E\u5E93\u8FDE\u63A5\u7684\u914D\u7F6E\uFF08url username password\uFF09
spring.datasource.url=jdbc:mysql://localhost:3306/blog_system?serverTimezone=UTC&characterEncoding=utf8&useUnicode=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root